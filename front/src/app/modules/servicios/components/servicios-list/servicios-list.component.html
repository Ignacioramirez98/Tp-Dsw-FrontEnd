<app-header-cliente *ngIf="isCliente"></app-header-cliente>
<app-header *ngIf="!isCliente"></app-header>

<div class="container mt-5">
  <h2 class="text-center mb-4">Servicios</h2>

  <div *ngIf="errorCarga" class="alert alert-warning text-center">
    {{ errorCarga }}
  </div>

  <!-- Botón Nuevo Servicio -->
  <div *ngIf="!isCliente" class="d-flex justify-content-end mb-3">
    <button class="btn btn-nuevo-servicio" (click)="nuevoServicio()">
      Nuevo Servicio
    </button>
  </div>

  <!-- Vista de cliente en cards -->
  <div *ngIf="isCliente" class="row">
    <div class="col-md-4 mb-4" *ngFor="let servicio of paginatedServicios">
      <div class="card h-100 shadow-sm servicio-card">
        <img
          *ngIf="servicio.imagenUrl"
          [src]="'http://localhost:3000' + servicio.imagenUrl"
          alt="Imagen servicio"
          class="card-img-top servicio-img"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ servicio.nombre || 'Servicio' }}</h5>
          <p class="card-text">{{ servicio.descripcion }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla de Servicios para gestion -->
  <div *ngIf="!isCliente" class="table-responsive">
    <table class="table table-hover table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Imagen</th>
          <th>Descripción</th>
          <th class="precio-col">Importe / Hora</th> <!-- Solo esta columna -->
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let servicio of paginatedServicios">
          <td>{{ servicio._id }}</td>
          <td>
            <img
              *ngIf="servicio.imagenUrl"
              [src]="'http://localhost:3000' + servicio.imagenUrl"
              alt="Imagen servicio"
              style="width: 64px; height: 64px; object-fit: cover; border-radius: 6px;"
            />
          </td>
          <td>{{ servicio.descripcion }}</td>
          <td>{{ servicio.importe_por_hora | currency }}</td>
          <td class="d-flex justify-content-center align-items-center">
            <button class="btn btn-outline-success btn-sm me-2" (click)="editServicio(servicio._id)">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn btn-outline-danger btn-sm" (click)="deleteServicio(servicio._id)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Controles de paginación -->
  <div class="pagination-controls d-flex justify-content-center mt-4">
    <button class="btn btn-outline-primary me-2" (click)="prevPage()" [disabled]="currentPage === 1">
      <i class="bi bi-arrow-left"></i> Anterior
    </button>
    <span class="fs-5 mx-3 align-self-center">Página {{ currentPage }} de {{ totalPages }}</span>
    <button class="btn btn-outline-primary ms-2" (click)="nextPage()" [disabled]="currentPage === totalPages">
      Siguiente <i class="bi bi-arrow-right"></i>
    </button>
  </div>
</div>

<app-footer></app-footer>
